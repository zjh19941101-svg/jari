<style>
  :root{
    --bg:#f4f6fb; --surface:#ffffff; --surface2:#f0f4fa; --line:#e6ebf5; --line2:#d4ddee;
    --ink:#161d2e; --muted:#697089; --faint:#9aa3ba;
    --blue:#2563eb; --blue-d:#1d4ed8; --blue-l:#60a5fa; --sky:#0ea5e9;
    --green:#16a34a; --amber:#f59e0b; --red:#e11d48; --late:#ea580c;
    --seat:#3b82f6; --hold:#06b6d4; --mine:#16a34a; --taken:#cbd5e8;
    --grad:linear-gradient(135deg,#2563eb,#3b82f6 55%,#0ea5e9);
    --shadow:0 1px 2px rgba(30,50,90,.04),0 6px 20px rgba(30,50,90,.07);
    --shadow-lg:0 4px 12px rgba(30,50,90,.08),0 18px 44px rgba(30,50,90,.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;}
  .topbar{position:sticky; top:0; z-index:30; background:rgba(255,255,255,.82); backdrop-filter:blur(16px) saturate(1.4);
    border-bottom:1px solid var(--line); padding:12px 16px; display:flex; align-items:center; gap:12px;}
  .menu-btn{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--surface);
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; flex:none; transition:background .14s,transform .1s;}
  .menu-btn:active{transform:scale(.93);}
  .brand{font-weight:800; font-size:16px; letter-spacing:-.3px;} .brand .dot{color:var(--blue);}
  .topbar .who{margin-left:auto; font-size:13px; color:var(--muted); font-weight:600;}
  .wrap{max-width:840px; margin:0 auto; padding:18px 16px 48px;}
  .drawer-bg{position:fixed; inset:0; background:rgba(20,30,55,.4); z-index:40; opacity:0; pointer-events:none; transition:opacity .2s; backdrop-filter:blur(2px);}
  .drawer-bg.show{opacity:1; pointer-events:auto;}
  .drawer{position:fixed; top:0; left:0; bottom:0; width:270px; background:var(--surface); z-index:50;
    transform:translateX(-100%); transition:transform .26s cubic-bezier(.34,1.2,.4,1); box-shadow:6px 0 36px rgba(20,30,55,.14);
    display:flex; flex-direction:column; padding:18px 14px;}
  .drawer.show{transform:none;}
  .drawer .dhead{padding:8px 10px 16px; border-bottom:1px solid var(--line); margin-bottom:10px;}
  .drawer .dhead .t{font-weight:800; font-size:17px;} .drawer .dhead .s{font-size:12px; color:var(--muted); margin-top:3px;}
  .ditem{display:flex; align-items:center; gap:12px; padding:13px 12px; border-radius:12px; cursor:pointer; font-weight:700; font-size:14.5px; color:var(--ink); transition:background .14s,transform .1s;}
  .ditem:hover{background:var(--surface2);} .ditem:active{transform:scale(.98);} .ditem.on{background:#e8f0fe; color:var(--blue-d);}
  .ditem .ic{font-size:18px; width:22px; text-align:center;}
  .dsep{height:1px; background:var(--line); margin:10px 4px;}
  h1{font-size:23px; font-weight:800; letter-spacing:-.5px;}
  .pagehead{margin-bottom:4px;} .pagehead .sub{font-size:13px; color:var(--muted); margin-top:3px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:22px; box-shadow:var(--shadow); margin-top:16px;}
  .card.tight{padding:16px;}
  h2{font-size:18px; font-weight:800; margin-bottom:5px; letter-spacing:-.3px;} h3{font-size:15px; font-weight:800;}
  p.lead{color:var(--muted); font-size:13.5px; line-height:1.55; margin-bottom:14px;}
  label{display:block; font-size:13px; font-weight:700; margin:12px 0 6px;}
  input,select,textarea{width:100%; padding:12px 14px; border:1px solid var(--line2); border-radius:11px; font-size:15px; outline:none; background:#fbfdff; color:var(--ink); transition:border-color .14s, box-shadow .14s;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.12);}
  .btn{width:100%; margin-top:18px; padding:14px; border:none; border-radius:13px; font-size:15px; font-weight:800; cursor:pointer; background:var(--grad); color:#fff; box-shadow:0 6px 20px rgba(37,99,235,.30); transition:transform .1s, box-shadow .15s; letter-spacing:.2px;}
  .btn:active{transform:translateY(1px) scale(.995); box-shadow:0 3px 12px rgba(37,99,235,.26);} .btn.ghost{background:var(--surface2); color:var(--blue-d); border:1px solid var(--line2); box-shadow:none;}
  .hero{position:relative; overflow:hidden; background:linear-gradient(135deg,#eef4ff,#e3edff); border:1px solid #dbe6fb; border-radius:22px; padding:28px 24px; box-shadow:var(--shadow);}
  .hero::after{content:""; position:absolute; right:-40px; top:-40px; width:160px; height:160px; background:radial-gradient(circle,rgba(96,165,250,.28),transparent 70%); border-radius:50%;}
  .hero .eyebrow{font-size:11px; letter-spacing:3px; color:var(--blue); font-weight:800;}
  .hero h1{font-size:27px; margin:6px 0 4px; letter-spacing:-.8px;} .hero p{color:var(--muted); font-size:14px;}
  .tiles{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px;}
  .tile{background:var(--surface); border:1px solid var(--line); border-radius:17px; padding:18px; cursor:pointer; box-shadow:var(--shadow); transition:transform .14s cubic-bezier(.34,1.4,.5,1), box-shadow .15s, border-color .15s;}
  .tile:hover{transform:translateY(-4px); box-shadow:var(--shadow-lg); border-color:var(--blue-l);}
  .tile:active{transform:translateY(-1px) scale(.99);}
  .tile .ic{font-size:26px; display:inline-flex; width:46px; height:46px; align-items:center; justify-content:center; background:linear-gradient(135deg,#e0ecff,#dbeafe); border-radius:14px; box-shadow:inset 0 1px 2px rgba(255,255,255,.6);}
  .tile .t{font-weight:800; font-size:15px; margin-top:10px;} .tile .d{font-size:12px; color:var(--muted); margin-top:2px;}
  .codebox{background:linear-gradient(135deg,#f0f7ff,#e6f0ff); border:1px solid var(--line2); border-radius:18px; padding:26px 20px; text-align:center; margin-top:16px;}
  .codebox .lbl{font-size:12.5px; color:var(--blue-d); letter-spacing:1px; font-weight:700;}
  .bigcode{font-size:52px; font-weight:800; letter-spacing:12px; margin:8px 0 4px; color:var(--blue-d); font-variant-numeric:tabular-nums;}
  .ring{height:6px; background:#d4e2f7; border-radius:6px; overflow:hidden; margin:12px auto 2px; max-width:280px;}
  .ring i{display:block; height:100%; background:linear-gradient(90deg,var(--sky),var(--blue)); transition:width 1s linear;}
  .codehint{font-size:12px; color:var(--muted); margin-top:8px;}
  .seg{display:flex; gap:8px; margin-top:14px;}
  .segbtn{flex:1; padding:10px; border-radius:11px; border:1px solid var(--line2); background:var(--surface); font-weight:800; font-size:13.5px; cursor:pointer; color:var(--muted);}
  .segbtn.on{background:var(--blue); color:#fff; border-color:transparent;}
  .segbtn .st{display:block; font-size:11px; font-weight:600; margin-top:2px; opacity:.85;}
  .stat{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px;}
  .statcard{flex:1; min-width:84px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center; box-shadow:var(--shadow);}
  .statcard .num{font-size:24px; font-weight:800;} .statcard .t{font-size:12px; color:var(--muted); margin-top:2px;}
  .num.g{color:var(--green);} .num.o{color:var(--late);} .num.r{color:var(--red);} .num.b{color:var(--blue);}
  table{width:100%; border-collapse:collapse; font-size:13.5px; margin-top:6px;}
  th{text-align:left; padding:9px; border-bottom:2px solid var(--line2); font-size:12px; color:var(--muted);}
  td{padding:9px; border-bottom:1px solid var(--line);}
  .badge{font-size:11px; font-weight:800; padding:3px 9px; border-radius:20px;}
  .b-ok{background:#dcfce7; color:#15803d;} .b-half{background:#fef3c7; color:#b45309;} .b-late{background:#ffedd5; color:var(--late);} .b-no{background:#ffe4e6; color:#be123c;}
  .row2{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;}
  .field{flex:1 1 110px; min-width:92px;} .field label{font-size:12px; margin:0 0 4px;} .field input{padding:10px 11px; font-size:14px;}
  .mini{padding:10px 15px; border:none; border-radius:10px; font-weight:800; cursor:pointer; font-size:13.5px;}
  .go{background:var(--green); color:#fff;} .stop{background:#fff; color:var(--red); border:1px solid var(--red);}
  .exp{background:var(--blue); color:#fff;} .clr{background:#fff; color:var(--red); border:1px solid var(--red);}
  .stage{background:linear-gradient(180deg,#eef4fc,#f7faff); border:1px solid var(--line); border-radius:18px; padding:18px 12px 22px; margin-top:14px; overflow-x:auto;}
  .board{background:linear-gradient(180deg,#dbe7fb,#c7d9f5); color:var(--blue-d); text-align:center; letter-spacing:8px; font-size:12px; padding:11px 0; border-radius:30px 30px 8px 8px; max-width:360px; margin:0 auto 24px; font-weight:800; border:1px solid var(--line2);}
  .grid{display:inline-flex; flex-direction:column; gap:6px; min-width:100%;}
  .grow{display:flex; gap:6px; justify-content:center; align-items:center;}
  .rownum{width:16px; text-align:center; color:var(--faint); font-size:10px; font-weight:800; flex:none;}
  .cell{width:38px; height:34px; border-radius:8px 8px 4px 4px; border:1px solid; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:9px; transition:transform .1s, box-shadow .15s; flex:none; position:relative;}
  .cell .c{font-size:8px; font-weight:700;} .cell .n{font-size:9px; font-weight:800; margin-top:1px; max-width:34px; overflow:hidden; white-space:nowrap;}
  .ico{font-size:13px;}
  .free{background:#dbeafe; border-color:#93c5fd; color:#1e40af;}
  .free:hover{transform:translateY(-2px); box-shadow:0 5px 14px rgba(59,130,246,.35); background:#bfdbfe;}
  .hold{background:linear-gradient(160deg,#06b6d4,#0891b2); border-color:#22d3ee; color:#fff; box-shadow:0 0 16px rgba(6,182,212,.6); transform:translateY(-2px) scale(1.04); animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 14px rgba(6,182,212,.5);}50%{box-shadow:0 0 24px rgba(6,182,212,.85);}}
  .taken{background:var(--taken); border-color:#b3c1de; color:#7b88a6; cursor:not-allowed;}
  .mine{background:linear-gradient(160deg,#22c55e,#16a34a); border-color:#4ade80; color:#fff; box-shadow:0 0 16px rgba(34,197,94,.5);}
  .empty{background:transparent; border:1px dashed var(--line2); color:var(--faint);} .empty.editable{cursor:pointer;}
  .estage{background:linear-gradient(160deg,#fcd34d,#f59e0b); border-color:#fde68a; color:#7c4a03; cursor:default;}
  .edoor{background:linear-gradient(160deg,#7dd3fc,#0ea5e9); border-color:#bae6fd; color:#075985; cursor:default;}
  .ewindow{background:linear-gradient(160deg,#6ee7b7,#10b981); border-color:#a7f3d0; color:#065f46; cursor:default;}
  .lock{position:absolute; top:2px; right:3px; font-size:8px;}
  .legend{display:flex; gap:13px; flex-wrap:wrap; justify-content:center; margin-top:14px; font-size:12px; color:var(--muted);}
  .lg{display:inline-block; width:13px; height:13px; border-radius:4px; vertical-align:-2px; margin-right:5px; border:1px solid;}
  .lg-free{background:#dbeafe; border-color:#93c5fd;} .lg-hold{background:#06b6d4; border-color:#22d3ee;}
  .lg-mine{background:#16a34a; border-color:#4ade80;} .lg-taken{background:var(--taken); border-color:#b3c1de;}
  .palette{display:flex; gap:8px; flex-wrap:wrap; margin:6px 0 12px;}
  .tool{padding:8px 13px; border-radius:10px; border:1px solid var(--line2); background:var(--surface); color:var(--muted); font-weight:700; font-size:13px; cursor:pointer;}
  .tool.on{border-color:var(--blue); background:#e8f0fe; color:var(--blue-d); box-shadow:0 0 0 2px rgba(37,99,235,.15);}
  .confirmbar{position:fixed; left:0; right:0; bottom:0; z-index:40; padding:14px 16px calc(14px + env(safe-area-inset-bottom)); background:rgba(255,255,255,.94); backdrop-filter:blur(10px); display:flex; gap:12px; align-items:center; justify-content:center; border-top:1px solid var(--line);}
  .confirmbar .info{font-size:14px; font-weight:700;} .confirmbar .info small{display:block; color:var(--muted); font-weight:500; font-size:12px;}
  .confirmbtn{padding:13px 28px; border:none; border-radius:30px; font-weight:800; font-size:15px; cursor:pointer; background:var(--blue); color:#fff; box-shadow:0 6px 20px rgba(37,99,235,.35);}
  .confirmbtn:disabled{background:#cbd5e8; color:#8b97b3; box-shadow:none; cursor:not-allowed;}
  .cancelbtn{padding:13px 18px; border:1px solid var(--line2); border-radius:30px; font-weight:700; font-size:14px; cursor:pointer; background:#fff; color:var(--muted);}
  .overlay{position:fixed; inset:0; background:rgba(20,30,55,.45); backdrop-filter:blur(3px); z-index:60; display:flex; align-items:center; justify-content:center; padding:24px; animation:fade .18s;}
  @keyframes fade{from{opacity:0;}}
  .modal{background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:28px 24px; max-width:350px; width:100%; text-align:center; box-shadow:0 24px 60px rgba(20,30,55,.25);}
  .modal .seatbig{font-size:40px; font-weight:800; margin:8px 0 4px; color:var(--blue-d);}
  .modal .who{color:var(--muted); font-size:14px; margin-bottom:20px;} .modal .who b{color:var(--ink);}
  .modal h3{font-size:16px; color:var(--blue-d); margin-bottom:2px;}
  .modal .acts{display:flex; gap:10px; margin-top:6px;}
  .modal .ok{flex:2; padding:13px; border:none; border-radius:12px; font-weight:800; font-size:15px; cursor:pointer; background:var(--blue); color:#fff;}
  .modal .no{flex:1; padding:13px; border:1px solid var(--line2); border-radius:12px; font-weight:700; font-size:14px; cursor:pointer; background:#fff; color:var(--muted);}
  .toast{position:fixed; left:50%; bottom:30px; transform:translateX(-50%); padding:12px 22px; border-radius:30px; color:#fff; font-size:14px; font-weight:700; z-index:80; box-shadow:0 10px 30px rgba(20,30,55,.25); animation:pop .2s;}
  .t-ok{background:var(--green);} .t-warn{background:var(--amber);} .t-info{background:#475569;}
  @keyframes pop{from{transform:translateX(-50%) translateY(8px); opacity:0;}}
  .banner{background:var(--surface2); border:1px solid var(--line); color:var(--muted); padding:11px 15px; border-radius:12px; font-size:13px; text-align:center; font-weight:600; margin-top:14px;}
  .banner.live{background:#dcfce7; border-color:#bbf7d0; color:#15803d;}
  .banner.ended{background:#ffe4e6; border-color:#fecdd3; color:#be123c;}
  .foot{text-align:center; margin-top:22px; font-size:12px; color:var(--faint);}
  .tip{font-size:12px; color:var(--muted); margin:4px 0 8px;}
  .crow{display:flex; justify-content:space-between; align-items:center; gap:10px; background:var(--surface2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px;}
  .crow .nm{font-weight:800; font-size:14px;} .crow .dt{font-size:12px; color:var(--muted);}
  .qrwarn{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:10px 12px;margin-top:12px;font-size:12.5px;color:#9a3412;line-height:1.5;text-align:left;}
  @media(max-width:560px){ .cell{width:33px; height:31px;} .bigcode{font-size:42px; letter-spacing:8px;} }
</style>
</head>
<body>
<div class="topbar"><div class="menu-btn" id="menuBtn">☰</div><div class="brand">자리<span class="dot"> · </span>Jari</div><div class="who" id="whoTop"></div></div>
<div class="drawer-bg" id="drawerBg"></div><div class="drawer" id="drawer"></div>
<div class="wrap" id="app"></div><div id="bar"></div><div id="modal"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get, update, remove, runTransaction }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

(function setupPWA(){
  try{
    const isAdminApp = location.hash.includes("admin");
    const icon = document.querySelector('link[rel="icon"]').href;
    const manifest = {
      name: isAdminApp ? "Jari 助教" : "자리 Jari",
      short_name: isAdminApp ? "Jari 助教" : "자리 Jari",
      start_url: isAdminApp ? (location.pathname+"#admin") : location.pathname,
      scope: location.pathname,
      display: "standalone", orientation: "portrait",
      background_color: "#f4f6fb", theme_color: "#2563eb",
      icons: [
        { src: icon, sizes: "180x180", type: "image/svg+xml", purpose: "any" },
        { src: icon, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
      ]
    };

  for(let i=0;i<s.length;i++){seed^=s.charCodeAt(i);seed=(seed*16777619)>>>0;} return pad(seed%1000000,6); }
function codeAtWin(code,startAt,secret,off){ const win=Math.floor((Date.now()-startAt)/(CODE_PERIOD*1000))+off;
  let seed=0x811c9dc5; const s=code+"|"+(secret||"")+"|"+win; for(let i=0;i<s.length;i++){seed^=s.charCodeAt(i);seed=(seed*16777619)>>>0;} return pad(seed%1000000,6); }
function codeLeft(startAt){ if(!startAt)return 0; return CODE_PERIOD-(((Date.now()-startAt)/1000)%CODE_PERIOD); }

function activeMeeting(c){ if(!c?.meetings)return null; const keys=Object.keys(c.meetings).sort((a,b)=>(c.meetings[b].at||0)-(c.meetings[a].at||0));
  for(const k of keys){ const m=c.meetings[k]; if(m.preOpen||m.postOpen) return {id:k,...m}; } return keys[0]?{id:keys[0],...c.meetings[keys[0]]}:null; }
function seatOpenNow(c){ if(!c)return false; if(c.seatOpen===true) return true; if(c.seatFrom&&c.seatTo){ const n=Date.now(); return n>=c.seatFrom&&n<=c.seatTo; } return false; }

function rememberCourse(code,name){ try{ const j=JSON.parse(localStorage.getItem("my_courses")||"{}"); j[code]=name||j[code]||code; localStorage.setItem("my_courses",JSON.stringify(j)); }catch{} }
function myCourses(){ try{ return JSON.parse(localStorage.getItem("my_courses")||"{}"); }catch{ return {}; } }
function forgetCourse(code){ try{ const j=myCourses(); delete j[code]; localStorage.setItem("my_courses",JSON.stringify(j)); }catch{} }
function subscribeCourse(code){ COURSE_CODE=code; onValue(ref(db,`courses/${code}`),s=>{ const prev=COURSE; COURSE=s.exists()?s.val():null; if(COURSE)rememberCourse(code,COURSE.name); notifyChanges(prev,COURSE); render(); }); }
if(COURSE_CODE&&!isAdmin) subscribeCourse(COURSE_CODE);
if(isAdmin) onValue(ref(db,`courses`),s=>{ allCourses=s.val()||{}; render(); });

let _shown={};
function notifyChanges(prev,cur){ if(!cur||isAdmin||!ME)return;
  const m=activeMeeting(cur), pm=prev?activeMeeting(prev):null;
  if(m){ for(const ph of ["pre","post"]){ const opened=m[ph+"Open"]&&!(pm&&pm.id===m.id&&pm[ph+"Open"]);
    const signed=cur.meetings?.[m.id]?.checkins?.[ME.id]?.[ph];
    const tag=cur.code+"|"+m.id+"|"+ph+"|"+(ph==="pre"?m.preAt:m.postAt);
    if(opened&&!signed&&!_shown[tag]){ _shown[tag]=1; toast((ph==="pre"?bi("수업 전","课前"):bi("수업 후","课后"))+bi(" 출석 시작!"," 签到开始!"),"ok"); if(VIEW!=="checkin")CHECKPHASE=ph; } } }
  if(seatOpenNow(cur)&&!(prev&&seatOpenNow(prev))&&!_shown["seat|"+cur.code]){ _shown["seat|"+cur.code]=1; toast(bi("좌석 선택 열림!","选座已开放!"),"ok"); }
}

async function loadTodayClasses(){
  const hold=$("todayHold"); if(!hold||!ME)return;
  const mine=myCourses(); const codes=Object.keys(mine); if(!codes.length)return;
  const today=[];
  await Promise.all(codes.map(async code=>{
    try{ const s=await get(ref(db,`courses/${code}`)); if(!s.exists())return; const c=s.val();
      const info=todayMeetingInfo(c); if(info){
        const seats=c.seats||{}; const myKey=Object.keys(seats).find(k=>seats[k]?.id===ME?.id);
        const seat=myKey?`${myKey.split("-")[0]*1+1}-${colL(seatColIdx(c,myKey))}`:null;
        // 今天是否已开签到
        const am=activeMeeting(c); const live=am&&(c.meetings[am.id].preOpen||c.meetings[am.id].postOpen);
        today.push({code,name:c.name||code,info,seat,live}); }
    }catch{}
  }));
  if(!today.length){ hold.innerHTML=`<div class="card" style="margin-top:16px;text-align:center"><div style="font-size:15px;font-weight:700;color:var(--muted)">📅 ${bi('오늘은 수업이 없습니다','今天没有课')}</div></div>`; return; }
  const cards=today.map(x=>`<div class="card" style="margin-top:12px;background:linear-gradient(135deg,#eef7ff,#f8fbff);border:1px solid #d6e8ff;cursor:pointer" data-todaycourse="${x.code}">

      <div style="flex:1"><div class="tip" style="margin:0">${x.info.label}</div>
        <h2 style="margin:2px 0">${x.name}</h2>
        <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;font-size:13px;color:var(--ink)">
          ${x.info.time?`<span>🕐 ${x.info.time}</span>`:''}
          ${x.info.room?`<span>📍 ${x.info.room}</span>`:''}
          ${x.seat?`<span>🎫 ${bi('내 자리','座位')} <b style="color:var(--blue)">${x.seat}</b></span>`:`<span style="color:var(--muted)">${bi('좌석 미선택','未选座')}</span>`}</div></div>

  hold.innerHTML=`<div style="margin-top:16px;font-size:13px;font-weight:800;color:var(--muted);letter-spacing:1px">📅 ${bi('오늘의 수업','今天的课')}</div>${cards}`;
  hold.querySelectorAll("[data-todaycourse]").forEach(b=>b.onclick=()=>{ const code=b.dataset.todaycourse; location.hash=`c=${code}`; COURSE=null; COURSE_CODE=code; subscribeCourse(code); VIEW="checkin"; render(); });

async function doCheckin(){

  const m=activeMeeting(COURSE); const ph=CHECKPHASE; const at=ph==="pre"?m.preAt:m.postAt; const sec=ph==="pre"?m.preSec:m.postSec; const open=ph==="pre"?m.preOpen:m.postOpen;
  if(!open||!at){toast(bi("출석이 닫혀 있습니다","签到已关闭"),"warn");return;}
  const already=COURSE?.meetings?.[m.id]?.checkins?.[ME.id]?.[ph];

  if(bind.fresh) await bindDevice(COURSE_CODE, ME.id, ME.name);   // 首次签到则绑定本设备

  try{ await runTransaction(ref(db,`courses/${COURSE_CODE}/meetings/${m.id}/checkins/${ME.id}/${ph}`), cur2=>{ if(cur2)return; return {ts:Date.now(),status}; }); }

}

async function loadTrash(){
  const hold=$("trashHold"); if(!hold)return; hold.innerHTML=`<p class="tip">${bi('불러오는 중…','加载中…')}</p>`;
  let trash={}; try{ const s=await get(ref(db,`trash`)); if(s.exists())trash=s.val(); }catch{}
  const keys=Object.keys(trash);
  if(!keys.length){ hold.innerHTML=`<button class="btn ghost" id="loadTrash">🗑 ${bi('휴지통 (비어있음)','回收站(空)')}</button>`; $("loadTrash").onclick=loadTrash; return; }
  const rows=keys.map(code=>{ const c=trash[code];
    return `<div class="crow"><div><div class="nm">${c.name||code} <span style="color:#9aa3ba">[${code}]</span></div>
      <div class="dt">${bi('삭제','删除')}: ${c.deletedAt?fmtTime(c.deletedAt):''} ${c.deletedBy?('· '+c.deletedBy):''}</div></div>
      <div style="display:flex;gap:6px"><button class="mini go" data-restore="${code}">${bi('복구','恢复')}</button><button class="mini clr" data-purge="${code}">${bi('영구삭제','永删')}</button></div></div>`; }).join("");
  hold.innerHTML=`<h3 style="margin-bottom:8px">🗑 ${bi('휴지통','回收站')} (${keys.length})</h3><div class="tip" style="margin:0 0 8px">${bi('복구하거나 영구 삭제할 수 있습니다','可恢复或永久删除')}</div>${rows}`;
  hold.querySelectorAll("[data-restore]").forEach(b=>b.onclick=()=>restoreCourse(b.dataset.restore));
  hold.querySelectorAll("[data-purge]").forEach(b=>b.onclick=()=>purgeCourse(b.dataset.purge));
}

  if(!wds.length){ toast(bi("요일을 하나 이상 선택","至少选一个上课日"),"warn"); return; }
  const time=$("semTime").value.trim(); const room=$("semRoom").value.trim();
  const skipWeeks=($("semSkip").value||"").split(/[,，\s]+/).map(x=>+x).filter(x=>x>=1&&x<=weeks);
  const startMonday=mondayOf(new Date(start+"T00:00:00").getTime());
  const preMin=Math.max(0,Math.min(120,+($("semPreMin")?.value)||5));
  const postMin=Math.max(0,Math.min(120,+($("semPostMin")?.value)||5));
  await update(ref(db,`courses/${code}`),{semester:{startMonday,weeks,weekdays:wds,time,room,skipWeeks},preMin,postMin});
  toast(bi("학기 일정 저장됨","学期课表已保存"),"ok"); }

function exportMeetingCSV(code,mid){ const s=allCourses[code]; const m=s.meetings[mid]; const ci=m.checkins||{}; const roster=s.roster||{}; const seats=s.seats||{};
  const seatById={}; for(const k of Object.keys(seats)){const[r,c]=k.split("-").map(Number); seatById[seats[k].id]=`${r+1}-${colL(seatColIdx(s,k))}`;}
  const rosterIds=Object.keys(roster); const allIds=[...new Set([...rosterIds,...Object.keys(ci)])].sort();
  const st=(id,ph)=>{ const x=ci[id]?.[ph]; if(!x)return rosterIds.length?"결석":"-"; return x.status==="late"?"지각":"출석"; };
  const rows=[["학번","이름","수업전","수업후","종합","좌석"]];
  allIds.forEach(id=>{ const both=ci[id]?.pre&&ci[id]?.post,none=!ci[id]?.pre&&!ci[id]?.post; const overall=both?"출석":none?(rosterIds.length?"결석":"-"):"불완전";
    rows.push([id,ci[id]?.name||roster[id]||"",st(id,"pre"),st(id,"post"),overall,seatById[id]||"-"]); });
  dl(rows,`${s.name||"강의"}_${m.title||mid}.csv`); }
function exportCourseCSV(code){ const s=allCourses[code]; const meetings=s.meetings||{}; const roster=s.roster||{};
  const mk=Object.keys(meetings).sort((a,b)=>(meetings[a].at||0)-(meetings[b].at||0));
  const students={}; Object.keys(roster).forEach(id=>students[id]=roster[id]);
  mk.forEach(id=>{ const ci=meetings[id].checkins||{}; Object.keys(ci).forEach(sid=>{ if(ci[sid].name)students[sid]=ci[sid].name; else if(!students[sid])students[sid]=""; }); });
  const ids=Object.keys(students).sort();
  const head=["학번","이름",...mk.map(id=>meetings[id].title||new Date(meetings[id].at).toLocaleDateString("ko-KR")),"출석률"];
  const rows=[head];
  ids.forEach(id=>{ let full=0; const cells=mk.map(mid=>{ const ci=meetings[mid].checkins?.[id]; const st=ci?((ci.pre&&ci.post)?"완전":(ci.pre||ci.post)?"반":"미"):"미"; if(st==="완전")full++; return st; });
    rows.push([id,students[id]||"",...cells, mk.length?Math.round(full/mk.length*100)+"%":"0%"]); });
  dl(rows,`${s.name||"강의"}_전체출석.csv`); }
function exportSeatsCSV(code){ const s=allCourses[code]; const seats=s.seats||{}; const roster=s.roster||{};
  // 按座位排序:行、列
  const rows=[[bi("좌석","座位"),bi("학번","学号"),bi("이름","姓名"),bi("선택 시각","选座时间")]];

// ───── 学期课表 ─────
const WD_KO=["일","월","화","수","목","금","토"]; const WD_ZH=["日","一","二","三","四","五","六"];
function wdLabel(d){ return bi(WD_KO[d]+"요일", "周"+WD_ZH[d]); }
// 计算第 week 周、星期 wd 的具体日期(week 从1开始)。startDate=开学那一周的周一(ms)
function weekDate(startMonday, week, wd){ const d=new Date(startMonday); d.setDate(d.getDate()+(week-1)*7+((wd===0?7:wd)-1)); return d; }
// 取某日期所在周的周一
function mondayOf(ts){ const d=new Date(ts); const day=d.getDay(); const diff=(day===0?-6:1-day); d.setDate(d.getDate()+diff); d.setHours(0,0,0,0); return d.getTime(); }
// 生成整学期课次安排:返回 [{week, wd, date(ms), label}]
function genSchedule(sem){ if(!sem||!sem.startMonday||!sem.weeks||!sem.weekdays?.length)return [];
  const skip=new Set(sem.skipWeeks||[]); const out=[];
  for(let w=1; w<=sem.weeks; w++){ if(skip.has(w))continue;
    for(const wd of sem.weekdays){ const dt=weekDate(sem.startMonday,w,wd); out.push({week:w,wd,date:dt.getTime(),label:bi(`${w}주차`,`第${w}周`)+" "+wdLabel(wd)}); } }
  return out; }
// 今天对应的课次(若今天是上课日)
function todayMeetingInfo(c){ if(!c?.semester)return null; const sem=c.semester;
  const now=new Date(); now.setHours(0,0,0,0); const today=now.getTime(); const wd=new Date().getDay();
  if(!sem.weekdays?.includes(wd))return null;
  const myMonday=mondayOf(today); const week=Math.round((myMonday-sem.startMonday)/(7*86400000))+1;
  if(week<1||week>sem.weeks)return null; if((sem.skipWeeks||[]).includes(week))return null;
  return {week,wd,label:bi(`${week}주차`,`第${week}周`)+" "+wdLabel(wd),time:sem.time||"",room:sem.room||""}; }

    <button class="mini exp" id="openFixed" style="margin-top:6px">🔗 ${bi('새 창에서 투사','新窗口打开投屏')}</button></div>`;

  // 标签切换
  const tabBar=`<div class="seg" style="margin-bottom:14px">
    <button class="segbtn ${ADMIN_TAB==='ops'?'on':''}" data-atab="ops">🎬 ${bi('운영','上课运营')}</button>
    <button class="segbtn ${ADMIN_TAB==='settings'?'on':''}" data-atab="settings">⚙️ ${bi('설정','设置')}</button></div>`;

  const opsView = `${weekPanel}${opsCard}${projCard}${ciCard}${makeupCard}${annCard}${archCard}`;
  const setView = `${semSetCard}
    <div class="card" style="text-align:center"><h3>${bi('학생 입장 QR','学生扫码进入')}(${bi('학기 공용','整学期通用')})</h3>
      <div class="tip">${bi('학기 내내 같은 코드','整学期同一码,扫一次长期用')}</div>
      <img src="${qrUrl}" style="width:180px;height:180px;border-radius:14px;border:1px solid var(--line);background:#fff;padding:6px;margin:6px auto"/>
      <div style="font-size:13px;color:var(--muted)">${bi('코드','课程码')}: <b style="color:var(--blue);font-size:18px;letter-spacing:2px">${code}</b></div>
      <div class="qrwarn">⚠️ ${bi('위챗에서 안 열리면: 「···」 → 「브라우저로 열기」','微信打不开时:右上角「···」→「在浏览器打开」')}</div></div>
    <div class="card"><h3 style="margin-bottom:6px">${t("importRoster")}</h3>
      <div class="tip">${bi('CSV 업로드 또는 붙여넣기, 한 줄에 「학번 이름」','CSV上传或粘贴,每行「学号 姓名」')}.${rosterIds.length?` ${bi('현재','当前')} ${rosterIds.length}${bi('명','人')}`:''}</div>
      <input type="file" id="rosterFile" accept=".csv,.txt" style="margin:8px 0 10px;font-size:13px"/>
      <textarea id="rosterText" placeholder="2026010101 홍길동&#10;2026010102,김철수" style="min-height:80px;resize:vertical"></textarea>
      <div class="row2" style="margin-top:8px"><button class="mini go" id="impR">${t("rosterImp")}</button>${rosterIds.length?`<button class="mini clr" id="clrR">${t("rosterClr")}</button>`:''}</div></div>
    <div class="card"><h3 style="margin-bottom:8px">${bi('좌석 선택','选座开放')} (${bi('학기 좌석','整学期座位')})</h3>
      <div class="row2" style="margin-bottom:8px"><button class="mini ${s.seatOpen?'stop':'go'}" id="toggleSeat">${s.seatOpen?bi('지금 마감','立即关闭'):bi('지금 열기','立即开放')}</button>
        <button class="mini exp" id="expSeats">⬇ ${bi('좌석표 CSV','座位表CSV')}</button>
        <button class="mini exp" id="bkCourse">💾 ${bi('전체 백업','整门备份')}</button></div>
      <div class="tip">${bi('또는 기간 지정(시간 단위)','或设定时段(精确到小时)')}:</div>
      <div class="row2"><div class="field"><label>${bi("시작","开始")}</label><input id="sFrom" type="datetime-local" value="${safeDT(s.seatFrom)}"></div>
        <div class="field"><label>${bi("종료","结束")}</label><input id="sTo" type="datetime-local" value="${safeDT(s.seatTo)}"></div>
        <button class="mini exp" id="setWin">${bi('기간 적용','应用时段')}</button></div></div>
    <div class="card"><h3 style="margin-bottom:8px">${t("seatLayout")}</h3>
      <div class="row2" style="margin-bottom:10px"><div class="field"><label>${bi("열","排")}</label><input id="rRows" type="number" value="${s.config?.rows||5}"></div>
        <div class="field"><label>${bi("줄","列")}</label><input id="rCols" type="number" value="${s.config?.cols||8}"></div>
        <button class="mini exp" id="doResize">${bi("크기 적용","应用尺寸")}</button><button class="mini clr" id="resetSeat">${bi("좌석 초기화","清空座位")}</button></div>
      <div class="tip">${bi('그리드를 칠해 좌석/통로/강단/문/창 지정','点格子设为座位/通道/讲台/门/窗')}</div><div class="palette">${palette}</div>
      ${s.config?.rows?seatMapHtmlFor(s,true):''}</div>
    ${auditCard}${bindCard}`;

  return `<button class="btn ghost" id="backList" style="margin:0 0 12px;width:auto;padding:8px 16px">← ${bi('목록','列表')}</button>
    <div class="pagehead"><h1>${s.name} <span style="color:var(--blue);font-size:18px">[${code}]</span></h1>
    <div class="sub">${bi('한 학기 강의','整学期课程')} · ${mk.length}${bi('회 수업','次课')} · ${ADMIN?ADMIN.name:""}</div></div>
    ${coEditBar}
    ${tabBar}

}
function seatMapHtmlFor(s,edit){ const cf=s.config,seats=s.seats||{}; let rows="";
  for(let r=0;r<cf.rows;r++){let cells="";
    for(let c=0;c<cf.cols;c++){const k=`${r}-${c}`,t=(cf.cells||{})[k]||"seat",occ=seats[k]; let cls="cell ",html="";
      if(t==="empty"){cls+="empty editable";html='<span class="c">·</span>';}
      else if(t==="stage"){cls+="estage";html='<span class="ico">🎤</span>';}
      else if(t==="door"){cls+="edoor";html='<span class="ico">🚪</span>';}
      else if(t==="window"){cls+="ewindow";html='<span class="ico">🪟</span>';}
      else if(occ){cls+="taken";html=`<span class="n">${occ.name.slice(0,2)}</span>`;}
      else{cls+="free";let i=0;for(let cc=0;cc<c;cc++)if(((cf.cells||{})[`${r}-${cc}`]||"seat")==="seat")i++;html=`<span class="c">${colL(i)}</span>`;}
      cells+=`<button class="cell ${cls}" data-r="${r}" data-c="${c}" data-edit="1">${html}</button>`;}
    rows+=`<div class="grow"><span class="rownum">${r+1}</span>${cells}</div>`;}
  return `<div class="stage"><div class="board">STAGE 讲台</div><div class="grid">${rows}</div></div>`;
}

function render(){
  // 独立投屏页:只显示干净大码,完全无管理界面
  if(IS_SCREEN){ renderScreen(); return; }
  if(!LANG){ buildDrawer(); $("app").innerHTML=""; langPicker(); return; }
  const ae=document.activeElement; if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA')){ setTimeout(render,1200); return; }
  buildDrawer(); $("whoTop").textContent=isAdmin?(ADMIN?ADMIN.name:""):(ME?ME.name:"");
  if(isAdmin){
    if(!adminAuthed){ adminLogin(); $("bar").innerHTML=""; return; }
    try{ $("app").innerHTML=ADMIN_VIEW==="overview"?adminOverview():ADMIN_CUR?adminCourse(ADMIN_CUR):adminManage(); }
    catch(e){ console.error(e); $("app").innerHTML=`<div class="card"><h3>${bi("오류","出错")}</h3><p class="lead">${bi("데이터 문제일 수 있어요.","数据可能有问题。")}</p><button class="btn ghost" id="bk">${bi("목록","返回列表")}</button></div>`; const b=$("bk"); if(b)b.onclick=()=>{ADMIN_CUR=null;ADMIN_VIEW="list";render();}; }
    $("bar").innerHTML=""; bindAll(); return; }
  if(!ME){ studentLogin(); bindAll(); return; }
  if(VIEW==="me"){ $("app").innerHTML=`<div id="mehold"><p style="text-align:center;color:#9aa3ba;padding:40px">${bi('불러오는 중…','加载中…')}</p></div>`; bindAll(); meView().then(h=>{const x=$("mehold");if(x){x.innerHTML=h; bindAll();}}); return; }
  if(VIEW==="notify"){ $("app").innerHTML=`<div id="ntfhold"><p style="text-align:center;color:#9aa3ba;padding:40px">${bi('불러오는 중…','加载中…')}</p></div>`; bindAll(); notifyView().then(h=>{const x=$("ntfhold");if(x){x.innerHTML=h; bindAll();}}); return; }
  if((VIEW==="checkin"||VIEW==="seat")&&!COURSE_CODE){ VIEW="home"; }
  let body=VIEW==="home"?homeView():VIEW==="checkin"?checkinView():VIEW==="seat"?seatView():homeView();
  $("app").innerHTML=body+`<div class="foot">${bi('실시간 동기화','实时同步')} · ${COURSE_CODE?bi('코드','码')+' '+COURSE_CODE:bi('코드 없음','无课程码')} · v8</div>`;
  renderSeatBar(); bindAll();
  if(VIEW==="home"&&ME) loadTodayClasses();
}
// 独立投屏页
let _screenSub=false;
function renderScreen(){
  document.querySelector(".topbar").style.display="none"; $("bar").innerHTML="";
  if(!_screenSub){ _screenSub=true;
    if(SCREEN_FIXED){ onValue(ref(db,`courses`),s=>{ allCourses=s.val()||{}; paintScreen(); }); }
    else { const code=SCREEN[1].toUpperCase(); onValue(ref(db,`courses/${code}`),s=>{ allCourses[code]=s.exists()?s.val():null; paintScreen(); }); }
  }
  paintScreen();
  if(!window._screenTick){ window._screenTick=setInterval(paintScreen,250); }
}
// 找当前正在签到的课和段(固定投屏用)
function findLiveScreen(){
  for(const code of Object.keys(allCourses)){ const c=allCourses[code]; if(!c?.meetings)continue;
    const m=activeMeeting(c); if(!m)continue; const mm=c.meetings[m.id];
    if(mm.preOpen) return {code,ph:"pre",c,m,mm};
    if(mm.postOpen) return {code,ph:"post",c,m,mm};
  }
  return null;
}
function paintScreen(){
  const host=$("app"); if(!host)return;
  if(!document.getElementById("scrnWrap")){
    host.innerHTML=`<div id="scrnWrap" style="position:fixed;inset:0;background:linear-gradient(160deg,#1d4ed8,#2563eb 55%,#0ea5e9);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px">
      <div id="scrnName" style="font-size:clamp(20px,3.2vw,34px);font-weight:800"></div>
      <div id="scrnPhase" style="font-size:clamp(14px,2vw,22px);opacity:.85;margin-top:4px"></div>
      <div style="font-size:clamp(13px,1.6vw,18px);opacity:.7;margin:30px 0 4px;letter-spacing:3px">${bi('출석 코드','签到验证码')}</div>
      <div id="scrnCode" style="font-size:clamp(70px,20vw,210px);font-weight:800;letter-spacing:clamp(8px,3vw,30px);font-variant-numeric:tabular-nums;line-height:1.02;text-shadow:0 8px 36px rgba(0,0,0,.28)">------</div>
      <div style="display:flex;align-items:center;gap:14px;margin-top:22px">
        <div style="width:min(60vw,460px);height:12px;background:rgba(255,255,255,.25);border-radius:12px;overflow:hidden"><div id="scrnRing" style="height:100%;background:#fff;border-radius:12px;transition:width .25s linear;width:0%"></div></div>
        <div id="scrnSec" style="font-size:clamp(20px,2.4vw,30px);font-weight:800;min-width:2.4em;text-align:left">--</div></div>
      <div style="font-size:clamp(13px,1.6vw,18px);opacity:.8;margin-top:18px">${bi('15초마다 자동 변경','每15秒自动变化')}</div>
      <div id="scrnFoot" style="font-size:clamp(12px,1.4vw,15px);opacity:.65;margin-top:8px"></div></div>`;
  }
  let code,ph,c,m,mm;
  if(SCREEN_FIXED){ const live=findLiveScreen();
    if(!live){ $("scrnName").textContent=bi("자리 Jari 투사 화면","Jari 投屏"); $("scrnPhase").textContent=bi("진행 중인 출석이 없습니다","当前没有进行中的签到");
      $("scrnCode").textContent=bi("대기중","等待开始"); $("scrnRing").style.width="0%"; $("scrnSec").textContent="--"; $("scrnFoot").textContent=bi("휴대폰에서 출석을 시작하면 자동 표시","手机上开始签到后自动显示"); return; }
    ({code,ph,c,m,mm}=live);
  } else { code=SCREEN[1].toUpperCase(); ph=SCREEN[2].toLowerCase(); c=allCourses[code]; if(!c){ $("scrnCode").textContent=bi("강의 없음","无此课程"); return; } m=activeMeeting(c); mm=m&&c.meetings[m.id]; }
  const at=mm?(ph==="pre"?mm.preAt:mm.postAt):0; const sec=mm?(ph==="pre"?mm.preSec:mm.postSec):""; const open=mm&&(ph==="pre"?mm.preOpen:mm.postOpen);
  $("scrnName").textContent=c.name||code;
  $("scrnPhase").textContent=(ph==="pre"?bi("수업 전 출석","课前签到"):bi("수업 후 출석","课后签到"))+(m?.title?(" · "+m.title):"");
  $("scrnFoot").textContent=bi("강의 코드","课程码")+": "+code;
  if(!open||!at){ $("scrnCode").textContent=bi("대기중","等待开始"); $("scrnRing").style.width="0%"; $("scrnSec").textContent="--"; return; }
  $("scrnCode").textContent=genCode(code,at,sec);
  const left=codeLeft(at); $("scrnRing").style.width=(left/CODE_PERIOD*100)+"%"; $("scrnSec").textContent=Math.ceil(left)+"s";
}
function renderSeatBar(){
  if(VIEW!=="seat"||!COURSE||!seatOpenNow(COURSE)){ $("bar").innerHTML=""; return; }
  const seats=COURSE.seats||{}; const myKey=Object.keys(seats).find(k=>seats[k]?.id===ME.id);
  if(myKey){const[r,c]=myKey.split("-").map(Number); $("bar").innerHTML=`<div class="confirmbar"><div class="info">예매 완료 🎉<small>${seatName(r,c)}</small></div><button class="cancelbtn" id="cs">${bi("취소","取消")}</button></div>`; $("cs").onclick=cancelMySeat;}
  else if(HOLD){const[r,c]=HOLD.split("-").map(Number); $("bar").innerHTML=`<div class="confirmbar"><div class="info">${bi("선택한 좌석","已选")}<small>${seatName(r,c)}</small></div><button class="confirmbtn" id="gc">${bi("확정","确定")} →</button></div>`; $("gc").onclick=askConfirm;}
  else $("bar").innerHTML=`<div class="confirmbar"><div class="info" style="color:#697089;font-weight:600">${bi("좌석을 선택하세요","请点座位")}</div><button class="confirmbtn" disabled>확정</button></div>`;
}
function bindAll(){
  $("menuBtn").onclick=()=>openDrawer(true); $("drawerBg").onclick=()=>openDrawer(false);
  document.querySelectorAll(".tile").forEach(b=>b.onclick=()=>drawerNav(b.dataset.go));
  $("enter")&&($("enter").onclick=()=>{const id=$("sid").value.trim(),name=$("sname").value.trim();if(!id||!name){toast("학번·이름 입력","warn");return;}ME={id,name};saveMe(id,name);VIEW="home";render();});
  document.querySelectorAll(".segbtn").forEach(b=>b.onclick=()=>{CHECKPHASE=b.dataset.phase;render();});
  $("doCheck")&&($("doCheck").onclick=doCheckin); $("cin")&&($("cin").onkeydown=e=>{if(e.key==="Enter")doCheckin();});
  $("sitBack")&&($("sitBack").onclick=()=>{const pf=prefSeat(COURSE_CODE);if(pf){HOLD=pf;render();}});
  document.querySelectorAll("[data-enter]").forEach(b=>b.onclick=()=>{ const code=b.dataset.enter; location.hash=`c=${code}`; subscribeCourse(code); VIEW="checkin"; render(); });
  document.querySelectorAll("[data-forget]").forEach(b=>b.onclick=()=>{ forgetCourse(b.dataset.forget); render(); });
  $("meJoin")&&($("meJoin").onclick=()=>joinPrompt());
  document.querySelectorAll(".cell").forEach(b=>b.onclick=()=>{const r=+b.dataset.r,c=+b.dataset.c; if(isAdmin)paintCell(ADMIN_CUR,r,c); else holdSeat(r,c);});
  $("newC")&&($("newC").onclick=()=>createCourse($("nName").value.trim(),+$("nLate").value||15));
  document.querySelectorAll("[data-unbind]").forEach(b=>b.onclick=()=>unbindStudent(ADMIN_CUR,b.dataset.unbind));
  $("renameMe")&&($("renameMe").onclick=()=>changeMyName());
  $("loadTrash")&&($("loadTrash").onclick=loadTrash);
  document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{ADMIN_CUR=b.dataset.open;ADMIN_VIEW="list";ADMIN_TAB="ops";render();});
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteCourse(b.dataset.del));
  $("backList")&&($("backList").onclick=()=>{ADMIN_CUR=null;render();});
  $("startMeet")&&($("startMeet").onclick=()=>startMeeting(ADMIN_CUR));
  $("semSave")&&($("semSave").onclick=()=>saveSemester(ADMIN_CUR));
  $("smartStart")&&($("smartStart").onclick=()=>smartStart(ADMIN_CUR));
  $("smartEnd")&&($("smartEnd").onclick=(e)=>smartEnd(ADMIN_CUR,e.currentTarget.dataset.mid));
  document.querySelectorAll("[data-atab]").forEach(b=>b.onclick=()=>{ ADMIN_TAB=b.dataset.atab; render(); });
  document.querySelectorAll("[data-stopph2]").forEach(b=>b.onclick=()=>{ const [ph,mid]=b.dataset.stopph2.split("|"); stopPhase(ADMIN_CUR,mid,ph); });
  document.querySelectorAll("[data-reopen]").forEach(b=>b.onclick=()=>{ const [ph,mid]=b.dataset.reopen.split("|"); const c=allCourses[ADMIN_CUR]; startPhase(ADMIN_CUR,mid,ph, ph==="pre"?(c.preMin||5):(c.postMin||5)); });
  $("annPost")&&($("annPost").onclick=()=>postAnnounce(ADMIN_CUR));
  document.querySelectorAll("[data-delann]").forEach(b=>b.onclick=()=>delAnnounce(ADMIN_CUR,b.dataset.delann));
  document.querySelectorAll("[data-startweek]").forEach(b=>b.onclick=()=>{ const [w,wd,label]=b.dataset.startweek.split("|"); startWeekMeeting(ADMIN_CUR,+w,+wd,label); });
  $("openFixed")&&($("openFixed").onclick=()=>{ window.open(location.origin+location.pathname+"#screen","_blank","noopener"); });
  document.querySelectorAll("[data-delm]").forEach(b=>b.onclick=()=>delMeeting(ADMIN_CUR,b.dataset.delm));
  document.querySelectorAll("[data-endm]").forEach(b=>b.onclick=()=>endMeeting(ADMIN_CUR,b.dataset.endm));
  document.querySelectorAll("[data-makeup]").forEach(b=>b.onclick=()=>{ const [code,mid]=b.dataset.makeup.split("|"); requestMakeup(code,mid); });
  document.querySelectorAll("[data-mkok]").forEach(b=>b.onclick=()=>approveMakeup(ADMIN_CUR,b.dataset.mkok,true));
  document.querySelectorAll("[data-mkno]").forEach(b=>b.onclick=()=>approveMakeup(ADMIN_CUR,b.dataset.mkno,false));
  document.querySelectorAll("[data-exparch]").forEach(b=>b.onclick=()=>exportMeetingCSV(ADMIN_CUR,b.dataset.exparch));
  document.querySelectorAll("[data-delarch]").forEach(b=>b.onclick=()=>delMeeting(ADMIN_CUR,b.dataset.delarch));
  const cur=ADMIN_CUR&&allCourses[ADMIN_CUR]; const mkNow=cur&&cur.meetings?Object.keys(cur.meetings).sort((a,b)=>(cur.meetings[b].at||0)-(cur.meetings[a].at||0))[0]:null;
  document.querySelectorAll("[data-startph]").forEach(b=>b.onclick=()=>startPhase(ADMIN_CUR,mkNow,b.dataset.startph));
  document.querySelectorAll("[data-stopph]").forEach(b=>b.onclick=()=>stopPhase(ADMIN_CUR,mkNow,b.dataset.stopph));
  document.querySelectorAll("[data-project]").forEach(b=>b.onclick=()=>{ const [cc,mid,ph]=b.dataset.project.split("|"); openProjection(cc,mid,ph); });
  $("manPre")&&($("manPre").onclick=()=>manualCheckin(ADMIN_CUR,mkNow,"pre"));
  $("manPost")&&($("manPost").onclick=()=>manualCheckin(ADMIN_CUR,mkNow,"post"));
  $("expM")&&($("expM").onclick=()=>exportMeetingCSV(ADMIN_CUR,mkNow));
  $("expCourse")&&($("expCourse").onclick=()=>exportCourseCSV(ADMIN_CUR));
  $("expSeats")&&($("expSeats").onclick=()=>exportSeatsCSV(ADMIN_CUR));
  $("bkCourse")&&($("bkCourse").onclick=()=>backupCourse(ADMIN_CUR));
  $("impR")&&($("impR").onclick=()=>importRoster(ADMIN_CUR));
  $("clrR")&&($("clrR").onclick=()=>clearRoster(ADMIN_CUR));
  $("rosterFile")&&($("rosterFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{if($("rosterText"))$("rosterText").value=rd.result;toast(bi("파일 로드됨","已读入文件"),"info");};rd.readAsText(f,"utf-8");});
  $("toggleSeat")&&($("toggleSeat").onclick=()=>toggleSeatOpen(ADMIN_CUR));
  $("setWin")&&($("setWin").onclick=()=>setSeatWindow(ADMIN_CUR,$("sFrom").value,$("sTo").value));
  $("doResize")&&($("doResize").onclick=()=>resize(ADMIN_CUR,+$("rRows").value,+$("rCols").value));
  $("resetSeat")&&($("resetSeat").onclick=()=>resetSeats(ADMIN_CUR));
  document.querySelectorAll(".tool").forEach(b=>b.onclick=()=>{TOOL=b.dataset.tool;render();});
}
render();
